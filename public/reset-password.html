<!DOCTYPE html>
<!--
  TrainLab password reset page (v1.1 item 9)
  Served by Vercel at https://fitness-app-jet-nine.vercel.app/reset-password.html

  ⚠ REQUIRED — after deploying, whitelist this URL in:
       Supabase Dashboard → Authentication → URL Configuration → Redirect URLs
         https://fitness-app-jet-nine.vercel.app/reset-password.html

  Without this whitelist entry, the recovery-link redirect fails silently and
  the page never receives an auth session, so the password can't be changed.

  The app has no OAuth deep-link scheme (social login uses native ID tokens),
  so the reset is completed here in the browser — the same web-fallback pattern
  as delete-account.html.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060A26" />
  <title>Reset your TrainLab password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #060A26;
      --bg-surface: #0E1338;
      --bg-subtle: #131845;
      --text-primary: #E5E9FB;
      --text-secondary: #B5BBE0;
      --text-muted: #7B8BA5;
      --border-glass: rgba(255,255,255,0.08);
      --accent-blue: #3b82f6;
      --accent-purple: #a78bfa;
      --radius-md: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; align-items: center; justify-content: center; padding: 24px 16px 48px; }
    .root { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .brand {
      font-size: 36px; font-weight: 900; letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
    }
    .title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin: 0; text-align: center; }
    .subtitle { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin: 0; text-align: center; line-height: 1.5; }
    .card {
      width: 100%; background: var(--bg-surface);
      border: 1px solid var(--border-glass); border-radius: var(--radius-md);
      padding: 22px 20px; display: flex; flex-direction: column; gap: 14px;
    }
    label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    input[type=password] {
      width: 100%; padding: 12px 14px; font-size: 15px; font-family: inherit;
      background: var(--bg-subtle); color: var(--text-primary);
      border: 1px solid var(--border-glass); border-radius: var(--radius-md);
      outline: none; transition: border-color 0.15s;
    }
    input[type=password]:focus { border-color: var(--accent-blue); }
    button { font-family: inherit; cursor: pointer; border-radius: var(--radius-md); transition: opacity 0.15s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary {
      width: 100%; padding: 13px; font-size: 14px; font-weight: 700;
      background: var(--accent-blue); color: #fff; border: none;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }
    .info-box { padding: 12px 14px; border-radius: var(--radius-md); font-size: 13px; line-height: 1.55; }
    .info-box.info { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.25); color: var(--text-primary); }
    .info-box.success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3); color: var(--text-primary); }
    .error {
      font-size: 12px; color: #fca5a5; padding: 9px 12px;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-md); line-height: 1.5;
    }
    .meta { font-size: 13px; color: var(--text-secondary); margin: 0; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="root" id="root"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://kelsupblazafjzwzsqzb.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_SoFSkEJztCpDGkthwYawrA_0MxYzYhW';

    // Implicit flow (no flowType: 'pkce') so the recovery link works cross-device —
    // the email may be opened on a different device than the app.
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        detectSessionInUrl: true,
        persistSession: false,
        autoRefreshToken: false,
      },
    });

    const root = document.getElementById('root');
    const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    const header = () => `
      <div class="brand">TrainLab</div>
      <h1 class="title">Reset your password</h1>
      <p class="subtitle">Choose a new password for your TrainLab account.</p>
    `;
    const footer = () => `
      <p style="font-size: 12px; color: var(--text-muted); text-align: center; margin: 0; line-height: 1.5;">
        Need help? Email <a href="mailto:trainlabsupport@gmail.com" style="color: var(--text-muted); text-decoration: underline;">trainlabsupport@gmail.com</a>
      </p>
    `;

    function renderForm(errorMsg) {
      root.innerHTML = `
        ${header()}
        <form class="card" id="pw-form">
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label for="pw">New password</label>
            <input type="password" id="pw" name="pw" required minlength="6" autocomplete="new-password" placeholder="••••••••" />
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label for="pw2">Confirm new password</label>
            <input type="password" id="pw2" name="pw2" required minlength="6" autocomplete="new-password" placeholder="••••••••" />
          </div>
          ${errorMsg ? `<div class="error">${esc(errorMsg)}</div>` : ''}
          <button type="submit" class="primary" id="pw-submit">Update password</button>
        </form>
        ${footer()}
      `;
      document.getElementById('pw-form').addEventListener('submit', onSubmit);
    }

    function renderExpired() {
      root.innerHTML = `
        ${header()}
        <div class="card">
          <div class="info-box info">
            This reset link is invalid or has expired. Open the TrainLab app, tap
            <strong>Forgot password?</strong> on the sign-in screen, and request a new link.
          </div>
        </div>
        ${footer()}
      `;
    }

    function renderDone() {
      root.innerHTML = `
        ${header()}
        <div class="card">
          <div class="info-box success">
            <strong>Your password has been updated.</strong><br>
            Return to the TrainLab app and sign in with your new password.
          </div>
        </div>
        ${footer()}
      `;
    }

    async function onSubmit(e) {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      if (pw !== pw2) { renderForm('Passwords do not match.'); return; }
      if (pw.length < 6) { renderForm('Password must be at least 6 characters.'); return; }
      const btn = document.getElementById('pw-submit');
      btn.disabled = true;
      btn.textContent = 'Updating…';
      try {
        const { error } = await supabase.auth.updateUser({ password: pw });
        if (error) { renderForm(`Couldn't update your password: ${error.message}`); return; }
        await supabase.auth.signOut().catch(() => {});
        renderDone();
      } catch (e) {
        renderForm(`Couldn't update your password: ${e?.message || e}`);
      }
    }

    // Boot: the recovery link redirect carries the session in the URL hash;
    // detectSessionInUrl parses it. Show the form once a session exists.
    async function boot() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) { renderForm(null); return; }
      let resolved = false;
      const { data: sub } = supabase.auth.onAuthStateChange((_event, sess) => {
        if (sess && !resolved) {
          resolved = true;
          sub.subscription.unsubscribe();
          renderForm(null);
        }
      });
      setTimeout(() => {
        if (!resolved) {
          resolved = true;
          sub.subscription.unsubscribe();
          renderExpired();
        }
      }, 1500);
    }

    boot();
  </script>
</body>
</html>
