<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#080c16" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>TrainLab</title>
  </head>
  <body>
    <div id="app-splash" style="position:fixed;inset:0;z-index:99999;background:#060A26;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.4s ease;">
      <svg id="splash-dumbbell" viewBox="0 0 64 64" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:72px;height:72px;">
        <rect x="4" y="26" width="12" height="12" rx="3"/>
        <rect x="14" y="22" width="8" height="20" rx="2"/>
        <rect x="48" y="26" width="12" height="12" rx="3"/>
        <rect x="42" y="22" width="8" height="20" rx="2"/>
        <line x1="22" y1="32" x2="42" y2="32" stroke-width="5"/>
      </svg>
      <div style="font-size:32px;font-weight:900;letter-spacing:-0.03em;background:linear-gradient(135deg,#3b82f6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">TrainLab</div>
      <div style="font-size:13px;color:#7b8ba5;font-weight:500;">Your adaptive training partner</div>
      <style>
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
        #splash-dumbbell{animation:bounce 1s ease-in-out infinite;}
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
