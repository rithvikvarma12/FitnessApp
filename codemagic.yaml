workflows:
  ios-workflow:
    name: TrainLab iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        certificates:
          - distribution_cert
        provisioning_profiles:
          - trainlab_appstore
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.trainlab.app"
      node: v22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: feat/ios-codemagic-setup
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Capacitor sync iOS
        script: |
          npx cap sync ios
      - name: Verify iOS web assets
        script: |
          echo "=== Check dist folder ==="
          ls -la $CM_BUILD_DIR/dist/ | head -20
          echo ""
          echo "=== Check ios/App/App/public ==="
          ls -la $CM_BUILD_DIR/ios/App/App/public/ 2>/dev/null | head -20 || echo "PUBLIC FOLDER MISSING"
          echo ""
          echo "=== Check capacitor.config.json ==="
          cat $CM_BUILD_DIR/ios/App/App/capacitor.config.json 2>/dev/null || echo "CONFIG JSON MISSING"
          echo ""
          echo "=== Check index.html in public ==="
          head -30 $CM_BUILD_DIR/ios/App/App/public/index.html 2>/dev/null || echo "INDEX.HTML MISSING"
      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
