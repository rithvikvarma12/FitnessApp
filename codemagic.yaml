workflows:
  ios-workflow:
    name: TrainLab iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.trainlab.app
        certificates:
          - distribution_cert
        provisioning_profiles:
          - trainlab_appstore
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.trainlab.app"
      node: v22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: feat/ios-codemagic-setup
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Capacitor sync iOS
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $(($(app-store-connect get-latest-build-number "$BUNDLE_ID" || echo "0") + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
