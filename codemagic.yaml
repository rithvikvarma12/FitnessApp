workflows:
  ios-workflow:
    name: TrainLab iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        certificates:
          - distribution_cert
        provisioning_profiles:
          - trainlab_appstore
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.trainlab.app"
      node: v22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: feat/ios-codemagic-setup
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Capacitor sync iOS
        script: |
          npx cap sync ios
          # Overwrite Package.swift with haptics only (adding plugins back one at a time)
          cat > "$CM_BUILD_DIR/ios/App/CapApp-SPM/Package.swift" << 'PKGEOF'
          // swift-tools-version: 5.9
          import PackageDescription

          // DO NOT MODIFY THIS FILE - managed by Capacitor CLI commands
          let package = Package(
              name: "CapApp-SPM",
              platforms: [.iOS(.v15)],
              products: [
                  .library(
                      name: "CapApp-SPM",
                      targets: ["CapApp-SPM"])
              ],
              dependencies: [
                  .package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", exact: "8.2.0"),
                  .package(name: "CapacitorHaptics", path: "../../../node_modules/@capacitor/haptics")
              ],
              targets: [
                  .target(
                      name: "CapApp-SPM",
                      dependencies: [
                          .product(name: "Capacitor", package: "capacitor-swift-pm"),
                          .product(name: "Cordova", package: "capacitor-swift-pm"),
                          .product(name: "CapacitorHaptics", package: "CapacitorHaptics")
                      ]
                  )
              ]
          )
          PKGEOF
          echo "=== Package.swift after fix ==="
          cat "$CM_BUILD_DIR/ios/App/CapApp-SPM/Package.swift"
      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
