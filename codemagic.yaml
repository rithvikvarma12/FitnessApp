workflows:
  ios-workflow:
    name: TrainLab iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        certificates:
          - distribution_cert
        provisioning_profiles:
          - trainlab_appstore
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.trainlab.app"
      node: v22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Capacitor sync iOS
        script: |
          npx cap sync ios
          # Overwrite Package.swift with all plugins (forward slashes for macOS)
          cat > "$CM_BUILD_DIR/ios/App/CapApp-SPM/Package.swift" << 'PKGEOF'
          // swift-tools-version: 5.9
          import PackageDescription

          // DO NOT MODIFY THIS FILE - managed by Capacitor CLI commands
          let package = Package(
              name: "CapApp-SPM",
              platforms: [.iOS(.v15)],
              products: [
                  .library(
                      name: "CapApp-SPM",
                      targets: ["CapApp-SPM"])
              ],
              dependencies: [
                  .package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", exact: "8.2.0"),
                  .package(name: "CapacitorHaptics", path: "../../../node_modules/@capacitor/haptics"),
                  .package(name: "CapacitorSplashScreen", path: "../../../node_modules/@capacitor/splash-screen"),
                  .package(name: "CapacitorPushNotifications", path: "../../../node_modules/@capacitor/push-notifications"),
                  .package(name: "CapacitorCommunityKeepAwake", path: "../../../node_modules/@capacitor-community/keep-awake"),
                  .package(name: "CapgoCapacitorSocialLogin", path: "../../../node_modules/@capgo/capacitor-social-login"),
                  .package(name: "RevenuecatPurchasesCapacitor", path: "../../../node_modules/@revenuecat/purchases-capacitor")
              ],
              targets: [
                  .target(
                      name: "CapApp-SPM",
                      dependencies: [
                          .product(name: "Capacitor", package: "capacitor-swift-pm"),
                          .product(name: "Cordova", package: "capacitor-swift-pm"),
                          .product(name: "CapacitorHaptics", package: "CapacitorHaptics"),
                          .product(name: "CapacitorSplashScreen", package: "CapacitorSplashScreen"),
                          .product(name: "CapacitorPushNotifications", package: "CapacitorPushNotifications"),
                          .product(name: "CapacitorCommunityKeepAwake", package: "CapacitorCommunityKeepAwake"),
                          .product(name: "CapgoCapacitorSocialLogin", package: "CapgoCapacitorSocialLogin"),
                          .product(name: "RevenuecatPurchasesCapacitor", package: "RevenuecatPurchasesCapacitor")
                      ]
                  )
              ]
          )
          PKGEOF
          echo "=== Package.swift after fix ==="
          cat "$CM_BUILD_DIR/ios/App/CapApp-SPM/Package.swift"
      - name: Set entitlements
        script: |
          cd $CM_BUILD_DIR/ios/App
          PBXPROJ="App.xcodeproj/project.pbxproj"

          # Use Python to reliably add CODE_SIGN_ENTITLEMENTS to all build configs
          python3 << 'EOF'
          import re

          with open("App.xcodeproj/project.pbxproj", "r") as f:
              content = f.read()

          # Add CODE_SIGN_ENTITLEMENTS after every INFOPLIST_FILE occurrence in buildSettings
          if "CODE_SIGN_ENTITLEMENTS" not in content:
              content = re.sub(
                  r'(INFOPLIST_FILE = [^;]+;)',
                  r'\1\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = "App/App.entitlements";',
                  content
              )
              with open("App.xcodeproj/project.pbxproj", "w") as f:
                  f.write(content)
              print("Added CODE_SIGN_ENTITLEMENTS to pbxproj")
          else:
              print("CODE_SIGN_ENTITLEMENTS already present")
          EOF

          echo "=== Verify ==="
          grep "CODE_SIGN_ENTITLEMENTS" "$PBXPROJ" || echo "STILL NOT FOUND"

          echo "=== Verify entitlements file exists ==="
          ls -la $CM_BUILD_DIR/ios/App/App/App.entitlements || echo "ENTITLEMENTS FILE MISSING"
      - name: Verify entitlements setup
        script: |
          echo "=== Entitlements file contents ==="
          cat $CM_BUILD_DIR/ios/App/App/App.entitlements
          echo ""
          echo "=== pbxproj entitlements references ==="
          grep -i "entitlements" $CM_BUILD_DIR/ios/App/App.xcodeproj/project.pbxproj
          echo ""
          echo "=== Provisioning profile entitlements ==="
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH=$(ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -n "$PROFILE_PATH" ]; then
            security cms -D -i "$PROFILE_PATH" | grep -A 20 "Entitlements"
          else
            echo "No provisioning profile found"
          fi
      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
