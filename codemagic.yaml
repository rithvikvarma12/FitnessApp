workflows:
  ios-workflow:
    name: TrainLab iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        certificates:
          - distribution_cert
        provisioning_profiles:
          - trainlab_appstore
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.trainlab.app"
      node: v22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: feat/ios-codemagic-setup
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Capacitor sync iOS
        script: |
          npx cap sync ios
      - name: Check Xcode build environment
        script: |
          xcodebuild -version
          echo ""
          echo "=== Check index.html has error catcher ==="
          grep "onerror" $CM_BUILD_DIR/ios/App/App/public/index.html && echo "ERROR CATCHER PRESENT" || echo "ERROR CATCHER MISSING"
          echo ""
          echo "=== Full index.html ==="
          cat $CM_BUILD_DIR/ios/App/App/public/index.html
      - name: Find Capacitor bridge
        script: |
          echo "=== Search for ALL capacitor/bridge related files ==="
          find $CM_BUILD_DIR -name "native-bridge*" -o -name "capacitor*.js" 2>/dev/null | grep -v node_modules/.cache | head -20
          echo ""
          echo "=== Check node_modules capacitor core ==="
          ls -la $CM_BUILD_DIR/node_modules/@capacitor/ios/ios/Capacitor/Capacitor/ 2>/dev/null | head -20 || echo "Not found at expected path"
          echo ""
          echo "=== Check SPM packages ==="
          find $CM_BUILD_DIR/ios -name "*.swift" -path "*/Capacitor/*" 2>/dev/null | head -10
          echo ""
          echo "=== Check if bridge is embedded in SPM package ==="
          find $CM_BUILD_DIR -path "*/capacitor-swift-pm/*" -name "*.js" 2>/dev/null | head -10
          find $CM_BUILD_DIR -path "*/@capacitor/ios/*" -name "*.js" 2>/dev/null | head -10
          echo ""
          echo "=== Package.swift contents ==="
          cat $CM_BUILD_DIR/ios/App/CapApp-SPM/Package.swift
      - name: Verify iOS web assets
        script: |
          echo "=== Check dist folder ==="
          ls -la $CM_BUILD_DIR/dist/ | head -20
          echo ""
          echo "=== Check ios/App/App/public ==="
          ls -la $CM_BUILD_DIR/ios/App/App/public/ 2>/dev/null | head -20 || echo "PUBLIC FOLDER MISSING"
          echo ""
          echo "=== Check asset paths in index.html ==="
          grep -o 'src="[^"]*"' $CM_BUILD_DIR/ios/App/App/public/index.html 2>/dev/null || echo "No src found"
          grep -o 'href="[^"]*"' $CM_BUILD_DIR/ios/App/App/public/index.html 2>/dev/null || echo "No href found"
          echo ""
          echo "=== Check capacitor.config.json ==="
          cat $CM_BUILD_DIR/ios/App/App/capacitor.config.json 2>/dev/null || echo "CONFIG JSON MISSING"
          echo ""
          echo "=== Capacitor native bridge files ==="
          find $CM_BUILD_DIR/ios -name "native-bridge.js" -o -name "capacitor.js" 2>/dev/null | head -10
          echo ""
          echo "=== Full ios/App/App directory ==="
          ls -laR $CM_BUILD_DIR/ios/App/App/ 2>/dev/null | head -60
          echo ""
          echo "=== project.pbxproj public references ==="
          grep -c "public" $CM_BUILD_DIR/ios/App/App.xcodeproj/project.pbxproj 2>/dev/null || echo "No public references"
      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
